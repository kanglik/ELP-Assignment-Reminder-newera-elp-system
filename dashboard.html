<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ELP 智能助手</title>
  <style>
    :root {
      --bg-main: #f8f9fa;
      --card-bg: #ffffff;
      --text-primary: #1a202c;
      --text-secondary: #718096;
      --border: #e2e8f0;
      --color-success: #38a169;
      --color-danger: #e53e3e;
    }

    [data-theme='dark'] {
      --bg-main: #121212;
      --card-bg: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0aec0;
      --border: #333333;
      --color-success: #48bb78;
      --color-danger: #f56565;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 30px;
      transition: all 0.3s ease;
    }

    .container { max-width: 1100px; margin: 0 auto; }
    header { margin-bottom: 40px; }
    h1 { font-weight: 300; letter-spacing: 2px; margin: 0; }

    .stats-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 13px; color: var(--text-secondary); }
    .stats-left { display: flex; gap: 30px; }
    .stats-right { display: flex; gap: 20px; }
    .stat-item span { font-weight: bold; margin-left: 5px; }
    
    .btn-bulk { background: none; border: none; padding: 0; font-size: 12px; cursor: pointer; text-decoration: underline; opacity: 0.8; }
    .btn-bulk:hover { opacity: 1; }

    .assignment-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .assignment-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
    }

    .card-title a {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
    }
    .card-title a:hover { opacity: 0.8; }

    .card-footer {
      margin-top: 15px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }

    .action-btns {
      margin-top: 15px;
      display: flex; gap: 20px;
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }
    .btn-action {
      background: none; border: none; padding: 0;
      color: var(--text-secondary);
      font-size: 12px; cursor: pointer;
    }
    .btn-action:hover { opacity: 0.7; }
    .btn-done-active { color: var(--color-success) !important; font-weight: bold; }

    .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; font-weight: bold; }
    .tag-done { color: var(--color-success); }
    .tag-pending, .tag-overdue { color: var(--color-danger); }

    .controls {
      display: flex; align-items: center; gap: 15px;
      margin-bottom: 20px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .controls input, .controls select {
      background: var(--card-bg); border: 1px solid var(--border);
      color: var(--text-primary); padding: 8px 12px; border-radius: 4px; outline: none;
    }
    /* 提醒设置的特殊样式：带一点点成功的绿色边框提示 */
    #remindDays { border-color: var(--border); color: var(--text-primary); }

    .toggle-group { margin-left: auto; font-size: 13px; color: var(--text-secondary); }
    .is-archived { opacity: 0.3; filter: grayscale(1); }
    .empty-state { text-align: center; padding: 60px; color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>ELP 智能助手</h1>
    </header>

    <div class="stats-bar">
      <div class="stats-left">
        <div class="stat-item">待完成 <span id="stat-pending" style="color:var(--color-danger)">0</span></div>
        <div class="stat-item">已逾期 <span id="stat-overdue" style="color:var(--color-danger)">0</span></div>
        <div class="stat-item">已完成 <span id="stat-completed" style="color:var(--color-success)">0</span></div>
      </div>
      <div class="stats-right">
        <button id="bulkArchiveOverdue" class="btn-bulk" style="color:var(--color-danger)">一键归档逾期</button>
        <button id="bulkArchiveDone" class="btn-bulk" style="color:var(--color-success)">一键归档完成</button>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="搜索作业..." />
      <select id="filterStatus">
        <option value="all">所有任务</option>
        <option value="pending" selected>待完成</option>
        <option value="completed">已完成</option>
        <option value="overdue">已逾期</option>
        <option value="archived">归档箱</option>
      </select>
      
      <!-- 🚀 提醒天数选择回归 -->
      <select id="remindDays">
        <option value="1">提前 1 天提醒</option>
        <option value="3">提前 3 天提醒</option>
        <option value="5">提前 5 天提醒</option>
      </select>
      
      <div class="toggle-group">
        <label><input type="checkbox" id="darkModeToggle"> 深色模式</label>
      </div>
    </div>

    <div id="board-content"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
