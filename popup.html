<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ELP 作业提醒</title>
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, sans-serif;
      text-align: center;
      background: #f8f9fa;
      margin: 0;
    }
    h2 { margin: 0 0 10px; font-size: 1.2em; color: #2c3e50; }
    .status-text { color: #7f8c8d; font-size: 13px; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    #dashboardBtn { background: #2c3e50; color: white; }
    #syncBtn { background: #3498db; color: white; }
  </style>
</head>
<body>

  <h2>📅 ELP Tracker v3</h2>
  <div class="status-text" id="statusInfo">后台准备就绪</div>

  <button id="dashboardBtn">📊 打开完整看板</button>
  <button id="syncBtn">🔄 后台智能扫描</button>

  <script src="popup.js"></script>
</body>
</html>
